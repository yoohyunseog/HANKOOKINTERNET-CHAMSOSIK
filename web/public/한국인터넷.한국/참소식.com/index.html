  <script>
    function escapeDiagramHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    // 내부 parseMermaidToRelations 함수 제거 (외부 robust 파서만 사용)

    // robust Mermaid 파서 결과를 masonry에 edgeLabel/edgeImportance까지 모두 반영
    function renderDiagramMasonry(relations, descArray) {
      const container = document.getElementById('diagram-masonry');
      const countBadge = document.getElementById('diagram-count');
      if (!container) return;

      const buildSearchUrl = (engine, query) => {
        const encoded = encodeURIComponent(query || '');
        if (engine === 'naver') return `https://search.naver.com/search.naver?query=${encoded}`;
        if (engine === 'google') return `https://www.google.com/search?q=${encoded}`;
        if (engine === 'bing') return `https://www.bing.com/search?q=${encoded}`;
        return `https://www.youtube.com/results?search_query=${encoded}`;
      };

      const buildCombinedQuery = (fromLabel, toLabel) => {
        const first = (fromLabel || '').trim();
        const second = (toLabel || '').trim();
        if (!first && !second) return '';
        if (!first) return second;
        if (!second) return first;
        if (first === second) return first;
        return `${first} ${second}`;
      };

      if (!relations.length) {
        container.innerHTML = `<div class="text-center py-4 text-muted">표시할 다이어그램 데이터가 없습니다.</div>`;
        if (window.adsbygoogle) {
          try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
        }
        if (countBadge) countBadge.textContent = '0개';
        return;
      }

      const importanceClass = (importance) => {
        if (importance === '중요') return 'importance-high';
        if (importance === '낮음') return 'importance-low';
        return 'importance-normal';
      };

      // --- 그룹화 로직 시작 ---
      // 금융 상품명 패턴 정의 (예: KOSPI, NASDAQ, DOWJONES, Bitcoin 등)
      const instrumentRegex = /^(KOSPI|KOSDAQ|S&P500|NASDAQ|DOWJONES|Bitcoin|Ethereum|USD\/KRW|Gold)/i;
      // 그룹: { instrument: { fromLabel, edges: [ {toLabel, edgeLabel, edgeImportance, ...} ] } }
      const groups = {};
      relations.forEach(rel => {
        const m = (rel.fromLabel || '').match(instrumentRegex);
        if (m) {
          const instrument = m[1];
          if (!groups[instrument]) {
            groups[instrument] = {
              fromLabel: rel.fromLabel,
              fromDesc: rel.fromDesc,
              fromImportance: rel.fromImportance,
              edges: []
            };
          }
          groups[instrument].edges.push({
            toLabel: rel.toLabel,
            toDesc: rel.toDesc,
            toImportance: rel.toImportance,
            edgeLabel: rel.edgeLabel,
            edgeImportance: rel.edgeImportance
          });
        }
      });
      // 그룹이 하나라도 있으면 그룹화된 카드, 없으면 기존 방식
      let items = [];
      if (Object.keys(groups).length > 0) {
        let groupIdx = 0;
        for (const [instrument, group] of Object.entries(groups)) {
          // 그룹 전체 검색어: fromLabel + 모든 toLabel + edgeLabel
          const searchTerms = [group.fromLabel]
            .concat(group.edges.map(e => e.toLabel))
            .concat(group.edges.map(e => e.edgeLabel || ''))
            .filter(Boolean)
            .join(' ');
            
          // 카드 내에 모든 edges를 리스트로 표시 (border와 화살표 추가)
          const edgeList = group.edges.map((edge, i, arr) => `
            <li style="position:relative;padding:12px 0 12px 0;${i < arr.length - 1 ? 'border-bottom:2px dashed #bbb;' : ''}">
              <span class="badge ${edge.edgeImportance === '중요' ? 'bg-danger' : edge.edgeImportance === '낮음' ? 'bg-secondary' : 'bg-warning'}">${edge.edgeImportance || ''}</span>
              <span class="fw-bold">${escapeDiagramHtml(group.fromLabel)}</span>
              <i class="bi bi-arrow-right" style="margin:0 6px;color:#888;font-size:1.1em;"></i>
              <span>${escapeDiagramHtml(edge.toLabel)}</span>
              ${edge.edgeLabel ? `<span class="text-muted ms-2">${escapeDiagramHtml(edge.edgeLabel)}</span>` : ''}
              ${i < arr.length - 1 ? `<span style="position:absolute;left:50%;bottom:-10px;transform:translateX(-50%);color:#bbb;font-size:1.2em;pointer-events:none;"><i class='bi bi-arrow-down'></i></span>` : ''}
            </li>
          `).join('');

            function normalize(str) {
              return (str || '').replace(/[\s\/]/g, '').toLowerCase();
            }

            const groupLabelNormalized = normalize(group.fromLabel);

            // desc 매칭
            let descInfo = null;

            if (Array.isArray(descArray)) {
              descInfo = descArray.find(d => {
                const indicatorNormalized = normalize(d.indicator);

                return (
                  groupLabelNormalized === indicatorNormalized ||
                  groupLabelNormalized.includes(indicatorNormalized) ||
                  indicatorNormalized.includes(groupLabelNormalized)
                );
              }) || null;
            }


            // text 노드 추출
            const textNodes = (group.edges || []).filter(e => {
              if (!e) return false;

              if (e.type === 'text') return true;

              if (typeof e.toLabel === 'string' && e.toLabel.startsWith('[text]')) {
                return true;
              }

              return false;
            });

          // 텍스트 노드가 있으면 표시
          const textHtml = textNodes.length > 0
            ? `<div class="diagram-text-nodes mb-2" style="border:1.5px dashed #aaa;border-radius:8px;padding:7px 10px 7px 10px;background:#f8fafc;">

        const label = (match[1] || '').replace(/&amp;/g, '&').replace(/\s+/g, ' ').trim();

        const key = label.toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);
        labels.push(label);
      }

      return labels;

    async function fetchJsonWithRetry(url, options = {}) {
      const retries = options.retries ?? 2;
      const retryDelayMs = options.retryDelayMs ?? 700;
      const retryStatuses = options.retryStatuses ?? [502, 503, 504];

      let lastError = null;

      for (let attempt = 0; attempt <= retries; attempt++) {
        try {
          const response = await fetch(url);

          if (response.ok) {
            return await response.json();
          }

          const shouldRetry = retryStatuses.includes(response.status) && attempt < retries;
          if (shouldRetry) {
            await new Promise(resolve => setTimeout(resolve, retryDelayMs * (attempt + 1)));
            continue;
          }

          throw new Error(`API 응답 실패: ${response.status} ${response.statusText}`);
        } catch (error) {
          lastError = error;
          if (attempt < retries) {
            await new Promise(resolve => setTimeout(resolve, retryDelayMs * (attempt + 1)));
            continue;
          }
        }
      }

      throw lastError || new Error('API 요청 실패');
    }

    async function fetchRecentWithFallback(preferredLimit = 100) {
      const limits = [preferredLimit, 50, 20, 10].filter((value, index, array) => array.indexOf(value) === index);
      let lastError = null;

      for (const limit of limits) {
        try {
          const payload = await fetchJsonWithRetry(`${API_BASE}/api/recent?limit=${limit}`, {
            retries: 3,
            retryDelayMs: 1000
          });

          if (payload && Array.isArray(payload.results)) {
            return payload;
          }
        } catch (error) {
          lastError = error;
          console.warn(`[fetchRecentWithFallback] limit=${limit} 실패:`, error.message);
        }
      }

      throw lastError || new Error('최근 데이터 조회 실패');
    }

    async function loadRecentData() {
      try {
        // URL 파라미터 확인
        const urlParams = new URLSearchParams(window.location.search);
        const searchKeyword = urlParams.get('search');
        const selectedMax = urlParams.get('selected_max');
        const selectedMin = urlParams.get('selected_min');
        
        if (searchKeyword && selectedMax !== null && selectedMin !== null) {
          // 제목 클릭 모드 - 최근 데이터만 로드 (불필요한 search API 호출 제거)
          const recentData = await fetchRecentWithFallback(100);
          
          document.getElementById('recent-count').textContent = `🎯 "${searchKeyword}" 기준 유사 항목 ${recentData.count}개`;
          
          recentDataCache = recentData.results;
          
          // 선택된 항목의 카테고리 찾기
          const clickedItem = recentDataCache.find(item => 
            cleanInputText(item.input) === searchKeyword
          );
          const targetCategory = clickedItem?.category || '일반';
          const targetMax = parseFloat(selectedMax);
          const targetMin = parseFloat(selectedMin);
          
          // 메타 태그 업데이트
          if (clickedItem) {
            updateMetaTags(clickedItem);
          }
          
          // 유사도 기반 정렬 수행
          sortBySimilarityWithData('recent-data', recentDataCache, targetCategory, targetMax, targetMin, false);
          updateCategoryCount(recentDataCache);
        } else {
          // 일반 모드 - limit 100
          const data = await fetchRecentWithFallback(100);
          document.getElementById('recent-count').textContent = `${data.count}개`;
          
          recentDataCache = data.results;
          renderFilteredData('recent-data', recentDataCache, false);
          updateCategoryCount(recentDataCache);
        }
      } catch (error) {
        console.error('[loadRecentData] 오류:', error);
        
        // 기존 캐시가 있으면 계속 표시
        if (recentDataCache.length > 0) {
          console.warn('[loadRecentData] API 실패하지만 기존 데이터 유지');
          renderFilteredData('recent-data', recentDataCache, false);
          
          // 상단에 경고 메시지 추가
          const alertDiv = document.createElement('div');
          alertDiv.className = 'alert alert-warning alert-dismissible fade show mx-3 mt-2';
          alertDiv.innerHTML = `
            <i class="bi bi-exclamation-circle"></i> 
            <strong>서버 오류:</strong> 최신 데이터를 불러올 수 없습니다. (기존 데이터 표시 중)
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          `;
          document.getElementById('recent-data').parentElement.insertBefore(alertDiv, document.getElementById('recent-data'));
          
          // 5초 후 자동으로 메시지 제거
          setTimeout(() => {
            alertDiv.remove();
          }, 5000);
        } else {
          // 캐시가 없으면 에러 메시지만 표시
          document.getElementById('recent-data').innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> 데이터를 불러올 수 없습니다.<br><small>오류: ${error.message}</small></div>`;
        }
      }
    }

    async function loadPopularData() {
      try {

        if (!response.ok) {

        // 기존 캐시가 있으면 계속 표시
        if (popularDataCache.length > 0) {
          console.warn('[loadPopularData] API 실패하지만 기존 데이터 유지');
          renderFilteredData('popular-data', popularDataCache, true);
          
          // 상단에 경고 메시지 추가

    // 탭 전환 이벤트
    document.getElementById('popular-tab').addEventListener('shown.bs.tab', function () {

        renderFilteredData('popular-data', popularDataCache, true);
      }

    document.getElementById('recent-tab').addEventListener('shown.bs.tab', function () {

    // 키워드 클릭 추적
    function trackKeywordClick(keyword) {
      if (keyword) {
        fetch(`${API_BASE}/api/track-keyword?keyword=${encodeURIComponent(keyword)}`)
          .catch(err => console.log('Keyword tracking:', err));
      }
    }

    // 조회수 증가 (제목 클릭 시)
    function incrementViewCount(itemId) {
      if (!itemId) {
        console.warn('조회수 증가: ID 없음');
        return;
      }

      // 사용자가 곧바로 페이지 이동해도 요청이 취소되지 않도록 keepalive 사용
      incrementViewCountOnScreen(itemId);

      fetch(`${API_BASE}/api/search?id=${encodeURIComponent(itemId)}&_=${Date.now()}`, {
        method: 'GET',
        cache: 'no-store',
        keepalive: true
      })
        .then(res => res.json())
        .then(data => {
          if (data.success && data.results && data.results.length > 0) {
            const newViewCount = data.results[0].view_count;
            updateViewCountOnScreen(itemId, newViewCount);
          }
        })
        .catch(err => console.error('조회수 증가 실패:', err));
    }

    // 서버 응답 전에도 화면 조회수는 즉시 1 증가
    function incrementViewCountOnScreen(itemId) {
      const titleElements = document.querySelectorAll(`[data-item-id="${itemId}"]`);

      titleElements.forEach(titleElement => {
        const card = titleElement.closest('.data-card');
        if (!card) return;

        const viewCountSpan = card.querySelector('.text-muted .ms-3');
        if (!viewCountSpan) return;

        const match = viewCountSpan.textContent.match(/조회수\s*(\d+)회/);
        const current = match ? parseInt(match[1], 10) : 0;
        const next = current + 1;

        viewCountSpan.textContent = `조회수 ${next}회`;
        viewCountSpan.style.animation = 'highlightText 0.5s ease';
        setTimeout(() => {
          viewCountSpan.style.animation = '';
        }, 500);
      });
    }

    // 화면의 조회수 표시 업데이트
    function updateViewCountOnScreen(itemId, newViewCount) {
      // 모든 카드에서 해당 ID를 가진 요소 찾기
      const titleElements = document.querySelectorAll(`[data-item-id="${itemId}"]`);
      
      titleElements.forEach(titleElement => {
        // 제목 요소의 부모 카드에서 조회수 span 찾기
        const card = titleElement.closest('.data-card');
        if (card) {
          const viewCountSpan = card.querySelector('.text-muted .ms-3');
          if (viewCountSpan) {
            viewCountSpan.textContent = `조회수 ${newViewCount}회`;
            // 조회수가 업데이트되었음을 시각적으로 표시
            viewCountSpan.style.animation = 'highlightText 0.5s ease';
            setTimeout(() => {
              viewCountSpan.style.animation = '';
            }, 500);
          }
        }
      });
      
      // 캐시에도 업데이트
      updateViewCountInCache(itemId, newViewCount);
    }

    // 캐시 데이터의 조회수 업데이트
    function updateViewCountInCache(itemId, newViewCount) {
      // recentDataCache 업데이트
      recentDataCache.forEach(item => {
        if ((item.id || item.calculation_id) === itemId) {
          item.view_count = newViewCount;
        }
      });
      
      // popularDataCache 업데이트
      popularDataCache.forEach(item => {
        if ((item.id || item.calculation_id) === itemId) {
          item.view_count = newViewCount;
        }
      });
    }

    // 검색 모드로 전환 (페이지 새로고침)
    function searchByKeyword(keyword, index, nbMax, nbMin) {
      // URL에 검색 파라미터와 선택된 항목 정보 추가하여 페이지 이동
      const params = new URLSearchParams();
      params.set('search', keyword);
      params.set('selected_max', nbMax);
      params.set('selected_min', nbMin);
      
      // 페이지 새로고침하면서 검색 모드로 전환
      window.location.href = `${window.location.pathname}?${params.toString()}`;
    }

    // MAX/MIN 값 기준 유사도 정렬 (카테고리 50% + MAX 25% + MIN 25%)
    function sortBySimilarity(clickedIndex, targetMax, targetMin) {
      // 현재 활성 탭 확인
      const activeTab = document.querySelector('.nav-link.active').id;
      let currentData = activeTab === 'recent-tab' ? recentDataCache : popularDataCache;
      const containerId = activeTab === 'recent-tab' ? 'recent-data' : 'popular-data';
      const showRank = activeTab === 'popular-tab';
      
      // 클릭된 항목의 카테고리 찾기
      const clickedItem = currentData[clickedIndex];
      const targetCategory = clickedItem?.category || '일반';
      
      sortBySimilarityWithData(containerId, currentData, targetCategory, targetMax, targetMin, showRank);
    }

    // 유사도 정렬 실제 수행 함수
    function sortBySimilarityWithData(containerId, currentData, targetCategory, targetMax, targetMin, showRank) {
      // 진행 중인 모든 애니메이션 타이머 취소
      sortingTimers.forEach(timer => clearTimeout(timer));
      sortingTimers = [];
      
      // 카테고리 필터 적용
      let filtered = filterDataByCategory(currentData, currentCategory);
      
      // 카테고리 개수 업데이트
      updateCategoryCount(currentData);
      
      // MAX/MIN 범위 계산 (정규화용)
      const maxValues = filtered.map(f => f.results?.[0]?.nb_max || 0);
      const minValues = filtered.map(f => f.results?.[0]?.nb_min || 0);
      const maxRange = Math.max(...maxValues) - Math.min(...maxValues) || 1;
      const minRange = Math.max(...minValues) - Math.min(...minValues) || 1;
      
      // 유사도 계산 및 정렬 (카테고리 50% + MAX 25% + MIN 25%)
      const sortedData = filtered.map((item, idx) => {
        const itemMax = item.results?.[0]?.nb_max || 0;
        const itemMin = item.results?.[0]?.nb_min || 0;
        const itemCategory = item.category || '일반';
        
        // 1. 카테고리 유사도 (0~1, 0이 더 유사)
        const categoryDistance = itemCategory === targetCategory ? 0 : 1;
        
        // 2. MAX 값 유사도 (0~1, 0이 더 유사)
        const maxDistance = Math.abs(itemMax - targetMax) / maxRange;
        
        // 3. MIN 값 유사도 (0~1, 0이 더 유사)
        const minDistance = Math.abs(itemMin - targetMin) / minRange;
        
        // 4. 최종 유사도 점수 = 카테고리(50%) + MAX(25%) + MIN(25%)
        const totalSimilarity = (categoryDistance * 0.5) + (maxDistance * 0.25) + (minDistance * 0.25);
        
        return { 
          ...item, 
          originalIndex: idx, 
          categoryDistance,
          maxDistance,
          minDistance,
          totalSimilarity
        };
      }).sort((a, b) => a.totalSimilarity - b.totalSimilarity); // 점수가 낮을수록 유사
      
      // 컨테이너에 정렬 중 효과 추가
      const container = document.getElementById(containerId);
      container.classList.add('sorting');
      
      // 기존 아이템들에 sorting 클래스 추가
      const existingItems = container.querySelectorAll('.masonry-item');
      existingItems.forEach(item => item.classList.add('sorting'));
      
      // 애니메이션 후 컨테이너 비우기
      setTimeout(() => {
        container.innerHTML = '';
        container.classList.remove('sorting');
        
        // 스크롤을 최상단으로
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 300);
      
      // 카드를 하나씩 순차적으로 추가 (300ms 딜레이 후 시작)
      sortedData.forEach((item, index) => {
        const timer = setTimeout(() => {
          const category = item.category || '일반';
          const nbMax = item.results?.[0]?.nb_max || 0;
          const nbMin = item.results?.[0]?.nb_min || 0;
          const isSimilar = index > 0 && index <= 10; // 상위 10개를 유사 항목으로 표시
          // 유사도 점수 표시
          const categoryMatch = category === targetCategory ? '✓' : '✗';
          const cardHtml = `
            <div class="masonry-item new-item" data-category="${category}" style="animation-delay: ${(index * 50)}ms">
              <div class="data-card ${isSimilar ? 'similar-sorted' : ''}" data-item-index="${item.originalIndex}">
                <div class="mb-2">
                  ${index === 0 ? `<span class="badge bg-warning">🎯 선택됨</span>` : ''}
                  ${isSimilar ? `<span class="badge bg-warning ms-2">📊 유사 ${index}</span>` : `<span class="badge bg-secondary">#${index + 1}</span>`}
                  <span class="badge bg-info ms-2">${item.type === 'text' ? '텍스트' : '숫자'}</span>
                  <span class="badge bg-secondary ms-2">${category}</span>
                </div>
                <div class="mb-2">
                  ${item.type === 'text'
                    ? `<a href="?search=${encodeURIComponent(cleanInputText(item.input))}&selected_max=${nbMax}&selected_min=${nbMin}" class="title-text" data-item-id="${item.id || item.calculation_id}" onclick="incrementViewCount(this.getAttribute('data-item-id'))">${escapeHtml(cleanInputText(item.input))}</a>`
                    : `<span class="fw-bold">${escapeHtml(`[${item.input.join(', ')}]`)}</span>`
                  }
                </div>
                ${item.type === 'text' ? `<div class="mb-2 search-links">${buildSearchLinks(cleanInputText(item.input))}</div>` : ''}
                <div class="small text-muted">
                  <i class="bi bi-calendar3"></i> ${new Date(item.timestamp).toLocaleString('ko-KR')}
                  <span class="ms-3">조회수 ${item.view_count || 0}회</span>
                </div>
                <div class="small mt-2">
                  <i class="bi bi-arrow-up-circle text-success"></i> MAX: ${nbMax}
                  <span class="ms-2"><i class="bi bi-arrow-down-circle text-danger"></i> MIN: ${nbMin}</span>
                </div>
                ${index <= 10 ? `<div class="small mt-2 text-warning">
                  <i class="bi bi-percent"></i> 유사도: ${(item.totalSimilarity * 100).toFixed(1)}%
                  <br><small>카테고리: ${categoryMatch} (50%) | MAX: ${(item.maxDistance * 100).toFixed(1)}% (25%) | MIN: ${(item.minDistance * 100).toFixed(1)}% (25%)</small>
                </div>` : ''}
              </div>
            </div>
          `;
          // 임시 div에 HTML 삽입 후 첫 번째 자식 요소를 실제 컨테이너에 추가
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = cardHtml;
          const newCard = tempDiv.firstElementChild;
          container.appendChild(newCard);
          // 애니메이션 완료 후 new-item 클래스 제거
          setTimeout(() => {
            newCard.classList.remove('new-item');
          }, 600 + (index * 50)); // 애니메이션 시간 + 딜레이
        }, 300 + (index * 100)); // 300ms 딜레이 + 각 카드마다 100ms 간격
        sortingTimers.push(timer);
      });
    }

    loadRecentData();

    // 초기 로드
    document.addEventListener('DOMContentLoaded', function() {
      setupCategoryButtonListeners();
      setInterval(checkForNewPosts, 5000); // 5초마다 새 게시물 체크
    });

    // 브라우저 뒤로/앞으로 가기 지원
    window.addEventListener('popstate', function(event) {
      loadRecentData();
    });
  </script>

  <script>

  async function fetchYoutubeShorts(channelId, maxResults = 3) {
    try {
      const resp = await fetch('shorts_feed.xml');
      if (!resp.ok) return [];
      const xmlText = await resp.text();
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
      const entries = Array.from(xmlDoc.getElementsByTagName('entry'));
      return entries.slice(0, maxResults).map(entry => {
        const link = entry.getElementsByTagName('link')[0]?.getAttribute('href') || '';
        let thumbnail = '';
        const thumbEl = entry.getElementsByTagName('media:thumbnail')[0] || entry.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'thumbnail')[0];
        if (thumbEl) thumbnail = thumbEl.getAttribute('url') || '';
        const pubDate = entry.getElementsByTagName('published')[0]?.textContent.trim() || '';
        return { link, thumbnail, pubDate };
      });
    } catch (e) {
      console.warn('shorts_feed.xml 불러오기 실패', e);
      return [];
    }
  }

  function createYoutubeShortCard(short, idx = 0) {
    // 기존 .diagram-relation-card 스타일 활용, 제목은 제거
    // 카드에 data-link 속성 추가, 클릭 이벤트로 iframe 모달 재생
    return `
      <div class="masonry-item youtube-shorts-item" data-link="${short.link}" style="cursor:pointer;">
        <div class="diagram-relation-card" style="border:2px solid #ff0000;">
          <div style="text-align:center; margin-bottom:8px;">
            <span class="badge bg-danger"><i class="bi bi-youtube"></i> 유튜브 쇼츠</span>
          </div>
          <div class="shorts-thumbnail-wrapper" style="display:block;">
            <img src="${short.thumbnail}" alt="유튜브 쇼츠" style="width:100%;border-radius:10px;max-width:320px;margin:0 auto;display:block;">
          </div>
          <div class="small text-muted mt-1">${new Date(short.pubDate.trim()).toLocaleString('ko-KR')}</div>
          <div class="diagram-search-links mt-2">
            <a class="diagram-search-link" href="${short.link}" target="_blank" rel="noopener" title="유튜브 바로가기"><i class="bi bi-youtube"></i></a>
          </div>
        </div>
      </div>
    `;
  }

  async function insertYoutubeShortsToDiagram() {
    const channelId = 'UCEVf3QlL7lFRJxULWHux0mg';
    const shorts = await fetchYoutubeShorts(channelId, 1); // 1개만
    if (!shorts.length) return;
    const container = document.getElementById('diagram-masonry');
    if (!container) return;
    // 기존 쇼츠 카드 앞에서부터 shorts.length개만 제거 (여전히 1개만)
    let removed = 0;
    for (let i = 0; i < container.children.length && removed < shorts.length;) {
      const el = container.children[i];
      if (el.classList.contains('youtube-shorts-item')) {
        el.remove();
        removed++;
      } else {
        i++;
      }
    }
    // 새 쇼츠 카드 삽입 (항상 맨 앞부터)
    for (let i = 0; i < shorts.length; i++) {
      const cardHtml = createYoutubeShortCard(shorts[i], i);
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = cardHtml;
      const cardElem = tempDiv.firstElementChild;
      container.insertBefore(cardElem, container.children[i] || null);
    }
    // 쇼츠 카드 클릭 이벤트 위임 (한 번만 등록)
    if (!container._shortsModalHandler) {
      container.addEventListener('click', function(e) {
        let target = e.target;
        while (target && !target.classList.contains('youtube-shorts-item') && target !== container) {
          target = target.parentElement;
        }
        if (target && target.classList.contains('youtube-shorts-item')) {
          const link = target.getAttribute('data-link');
          if (link) {
            openShortsModal(link);
            e.preventDefault();
          }
        }
      });
      container._shortsModalHandler = true;
    }
  }

  // 다이어그램 렌더 후 유튜브 쇼츠 삽입 (10초마다 갱신)
  function setupYoutubeShortsAutoInsert() {
    setTimeout(() => insertYoutubeShortsToDiagram(), 1200); // 최초 렌더 후 약간의 딜레이
    setInterval(() => insertYoutubeShortsToDiagram(), 10000); // 10초마다 갱신
  }
  document.addEventListener('DOMContentLoaded', setupYoutubeShortsAutoInsert);

  // 유튜브 쇼츠 모달 관련 코드 추가
  // 모달 HTML 삽입 (최초 1회)
  function ensureShortsModal() {
    if (document.getElementById('shorts-iframe-modal')) return;
    const modalHtml = `
      <div class="modal fade" id="shorts-iframe-modal" tabindex="-1" aria-labelledby="shortsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="shortsModalLabel"><i class="bi bi-youtube"></i> 유튜브 쇼츠 재생</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="text-align:center;">
              <iframe id="shorts-iframe" width="420" height="750" style="max-width:100%;border-radius:12px;" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
  }

  // 쇼츠 링크를 iframe용으로 변환 (shorts → embed/shorts)
  function getShortsEmbedUrl(link) {
    // shorts 링크: https://www.youtube.com/shorts/ID → https://www.youtube.com/embed/ID
    const m = link.match(/\/shorts\/([\w-]+)/);
    if (m) {
      return `https://www.youtube.com/embed/${m[1]}?autoplay=1&modestbranding=1&rel=0&playsinline=1`;
    }
    // fallback: 그냥 링크
    return link;
  }

  // 모달 열기 함수
  function openShortsModal(link) {
    ensureShortsModal();
    const modal = document.getElementById('shorts-iframe-modal');
    const iframe = document.getElementById('shorts-iframe');
    iframe.src = getShortsEmbedUrl(link);
    // Bootstrap 5 모달 표시
    if (window.bootstrap && bootstrap.Modal) {
      const bsModal = bootstrap.Modal.getOrCreateInstance(modal);
      bsModal.show();
      // 모달 닫힐 때 영상 정지
      modal.addEventListener('hidden.bs.modal', function handler() {
        iframe.src = '';
        modal.removeEventListener('hidden.bs.modal', handler);
      });
    } else {
      // fallback: 그냥 보여주기
      modal.style.display = 'block';
    }
  }
  </script>
</body>
</html>
